const WORLDS=[

const ARMOR=[{p:"🥋",n:"Belt of Truth"},{p:"🛡",n:"Breastplate"},{p:"👟",n:"Shoes of Peace"},{p:"🔰",n:"Shield of Faith"},{p:"⛑",n:"Helm of Salvation"},{p:"⚔",n:"Sword of Spirit"}];
// Distractors organized by grammatical category for context-matching
const DISTRACTOR_POOL={
  verbs_s:["loves","hates","rules","creates","saves","judges","sees","hears","knows","forgives","commands","blesses","sends","dwells","reigns","speaks","forms","guides","calls","keeps"],
  verbs_base:["love","hate","rule","create","save","judge","see","hear","know","forgive","command","bless","send","dwell","reign","speak","form","guide","call","keep"],
  verbs_past:["loved","hated","ruled","created","saved","judged","saw","heard","knew","forgave","commanded","blessed","sent","dwelt","reigned","spoke","formed","guided","called","kept"],
  verbs_ing:["loving","hating","ruling","creating","saving","judging","seeing","hearing","knowing","forgiving","commanding","blessing","sending","dwelling","reigning","speaking","forming","guiding","calling","keeping"],
  adj:["righteous","wicked","faithful","sinful","blameless","corrupt","merciful","worthy","glorious","sovereign","almighty","just","gracious","perfect","broken","fallen","chosen","unworthy","defiled","redeemed"],
  nouns:["grace","faith","glory","wrath","covenant","righteousness","spirit","truth","mercy","salvation","redemption","judgment","creation","sacrifice","atonement","sanctification","justification","obedience","transgression","condemnation"],
  nouns_concrete:["soul","body","heart","flesh","law","word","blood","fire","bread","water","stone","light","darkness","temple","altar","throne","cross","tomb","crown","serpent"],
  other:["one","three","many","all","none","eternal","mortal","infinite","finite","divine"]
};
function detectWordCategory(word){
  const w=word.toLowerCase().trim();
  if(/ing$/.test(w))return 'verbs_ing';
  if(/ed$/.test(w)&&w.length>4)return 'verbs_past';
  if(/[^s]s$/.test(w)&&w.length>3&&!/ness|ious|eous|ous|ss$/.test(w))return 'verbs_s';
  if(DISTRACTOR_POOL.adj.some(d=>d===w))return 'adj';
  return 'nouns';
}
function buildWordBank(blanks,currentBlankIdx){
  const correctWord=blanks[currentBlankIdx];
  const pool=[correctWord];
  const cat=detectWordCategory(correctWord);
  const catPool=shuffle([...(DISTRACTOR_POOL[cat]||DISTRACTOR_POOL.nouns)]
    .filter(d=>!blanks.some(b=>b.toLowerCase()===d.toLowerCase())&&d.toLowerCase()!==correctWord.toLowerCase()));
  const nounPool=shuffle([...DISTRACTOR_POOL.nouns,...DISTRACTOR_POOL.nouns_concrete]
    .filter(d=>!blanks.some(b=>b.toLowerCase()===d.toLowerCase())&&d.toLowerCase()!==correctWord.toLowerCase()&&!catPool.includes(d)));
  let added=0;
  for(let i=0;i<catPool.length&&added<3;i++){pool.push(catPool[i]);added++;}
  for(let i=0;i<nounPool.length&&added<3;i++){pool.push(nounPool[i]);added++;}
  return shuffle(pool.slice(0,4));
}

{q:"Are there more gods than one?",full:"There is only one God.",blanks:["one"],dp:"There is only ___ God.",bd:"There is only ___ God."},

{q:"Who are they?",full:"The Father, the Son and the Holy Spirit.",blanks:["Father","Son","Holy Spirit"],dp:"The ___, the ___ and the ___.",bd:"The ___, the ___ and the ___."},

function save(){
  const saves=JSON.parse(localStorage.getItem('cq3s')||'{}');
  saves[G.name]={score:G.score,lives:G.lives,worldsDone:G.worldsDone,armorEarned:G.armorEarned,totalAnswered:G.totalAnswered,gender:G.gender,diff:G.diff,ts:Date.now()};
  localStorage.setItem('cq3s',JSON.stringify(saves));
  const lb=JSON.parse(localStorage.getItem('cq3lb')||'[]');
  const ei=lb.findIndex(e=>e.name===G.name);
  const ent={name:G.name,score:G.score,worlds:G.worldsDone.length,armor:G.armorEarned.length,ts:Date.now(),date:_fmtDate(Date.now())};
  if(ei>=0){if(G.score>lb[ei].score)lb[ei]=ent;}else lb.push(ent);
  lb.sort((a,b)=>b.score-a.score);
  localStorage.setItem('cq3lb',JSON.stringify(lb.slice(0,25)));
  if(_fbDb){
    _fbDb.ref('cq3lb').orderByChild('name').equalTo(G.name).once('value',snap=>{
      const data=snap.val();
      if(data){const key=Object.keys(data)[0];if(G.score>data[key].score)_fbDb.ref('cq3lb/'+key).set(ent);}
      else _fbDb.ref('cq3lb').push(ent);
    });
  }
}

// ===============================
let titleMusicPlaying=false;
function playTitleMusic(){
  if(titleMusicPlaying)return;
  titleMusicPlaying=true;
  try{
    const c=ac();
    // Zelda-inspired melody: upbeat, heroic
    const melody=[
      [392,0.12],[440,0.12],[494,0.12],[523,0.25],[0,0.08],
      [523,0.12],[587,0.12],[659,0.12],[698,0.25],[0,0.08],
      [784,0.18],[698,0.12],[659,0.12],[587,0.12],[523,0.25],[0,0.1],
      [494,0.12],[523,0.12],[587,0.18],[523,0.12],[440,0.12],[392,0.35],[0,0.15],
      [523,0.1],[523,0.1],[587,0.1],[659,0.2],[0,0.06],
      [659,0.1],[698,0.1],[784,0.1],[880,0.3],[0,0.1],
      [784,0.1],[698,0.1],[659,0.1],[587,0.1],[523,0.1],[440,0.1],[392,0.4]
    ];
    // Bass line
    const bass=[
      [196,0.5],[220,0.5],[247,0.5],[261,0.5],
      [294,0.5],[261,0.5],[220,0.5],[196,1.0]
    ];
    let t=c.currentTime+0.1;
    melody.forEach(([freq,dur])=>{
      if(freq>0){
        const o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(c.destination);
        o.type='square';o.frequency.value=freq;
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(0.09,t+0.01);
        g.gain.exponentialRampToValueAtTime(0.001,t+dur*0.9);
        o.start(t);o.stop(t+dur);
        // Harmony (fifth below)
        const o2=c.createOscillator(),g2=c.createGain();
        o2.connect(g2);g2.connect(c.destination);
        o2.type='triangle';o2.frequency.value=freq*0.667;
        g2.gain.setValueAtTime(0,t);
        g2.gain.linearRampToValueAtTime(0.04,t+0.01);
        g2.gain.exponentialRampToValueAtTime(0.001,t+dur*0.9);
        o2.start(t);o2.stop(t+dur);
      }
      t+=dur;
    });
    // Bass
    let tb=c.currentTime+0.1;
    bass.forEach(([freq,dur])=>{
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);
      o.type='triangle';o.frequency.value=freq;
      g.gain.setValueAtTime(0.06,tb);
      g.gain.exponentialRampToValueAtTime(0.001,tb+dur*0.8);
      o.start(tb);o.stop(tb+dur);
      tb+=dur;
    });
    // Schedule next loop
    setTimeout(()=>{titleMusicPlaying=false;if(document.getElementById('titleScr').classList.contains('on'))playTitleMusic();},t*1000-c.currentTime*1000+200);
  }catch(e){titleMusicPlaying=false;}
}

// ==================== NEW DETAILED PILGRIM (Boy + Girl with Brown Hair) ====================
function drawPilgrimCanvas(ctx, ox, oy, armor, scale = 2.5, frame = 0) {
  const s = scale;
  const belt = armor.includes(0);
  const breast = armor.includes(1);
  const shoes = armor.includes(2);
  const shield = armor.includes(3);
  const helm = armor.includes(4);
  const sword = armor.includes(5);
  const gender = G.gender || 'boy';

  const bob = (frame % 2 === 1) ? 1 : 0;

  function px(x, y, w, h, col) {
    ctx.fillStyle = col;
    ctx.fillRect(Math.round(ox + x*s), Math.round(oy + y*s), Math.round(w*s), Math.round(h*s));
  }

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(ox + 14*s, oy + 26*s, 11*s, 3*s, 0, 0, Math.PI*2);
  ctx.fill();

  // Feet
  const boot = shoes ? '#b86a2a' : '#3a2a1a';
  px(4, 19 + bob, 8, 6, boot);
  px(13, 19 - bob, 8, 6, boot);

  // Body / Dress
  if (gender === 'girl') {
    px(5, 6, 15, 14, '#c04070');
    px(6, 7, 13, 12, '#e06090');
    px(7, 15, 11, 3, '#a02050');
  } else {
    const tunic = breast ? '#a0a0b8' : '#2a6a2a';
    const tunicHi = breast ? '#c0c0d8' : '#3a9a3a';
    px(5, 6, 15, 10, tunic);
    px(6, 7, 13, 7, tunicHi);
  }

  // Belt
  if (belt) {
    px(5, 11, 15, 3, '#d8a030');
    px(6, 11, 13, 2, '#f0c040');
    px(10, 10, 5, 3, '#b08020');
  }

  // Arms
  const armCol = gender === 'girl' ? '#c04070' : '#2a6a2a';
  px(3, 8, 4, 9, armCol);
  px(17, 8, 4, 9, armCol);

  if (shield) {
    px(-1, 5, 9, 12, '#b8a050');
    px(1, 6, 7, 10, '#d0c070');
    px(3, 8, 3, 6, '#c04020');
  } else {
    px(3, 13, 4, 4, '#c0906a');
  }

  if (sword) {
    ctx.save();
    ctx.translate(ox + 21*s, oy + 13*s);
    ctx.rotate(-0.75);
    ctx.fillStyle = '#d0d8e0'; ctx.fillRect(-1.5*s, -22*s, 3*s, 24*s);
    ctx.fillStyle = '#b88030'; ctx.fillRect(-4*s, -5*s, 9*s, 5*s);
    ctx.fillStyle = '#f0f8ff'; ctx.fillRect(-1*s, -25*s, 3*s, 4*s);
    ctx.restore();
  } else {
    px(18, 13, 4, 4, '#c0906a');
  }

  // Brown Hair
  const hairDark = '#2a1a10';
  const hairMid  = '#3a2a18';
  if (gender === 'girl') {
    px(4, -6, 17, 13, hairDark);
    px(5, -7, 15, 11, hairMid);
    px(16, -3, 6, 13, hairDark);
    px(17, -2, 4, 10, hairMid);
  } else {
    px(6, -4, 13, 9, hairDark);
    px(7, -5, 11, 7, hairMid);
  }

  // Face
  px(7, 1, 11, 8, '#f0c090');
  px(8, 2, 9, 6, '#ffd0a8');

  px(9, 4, 2, 2, '#1a1a1a');
  px(13, 4, 2, 2, '#1a1a1a');
  px(9, 4, 1, 1, '#ffffff');
  px(13, 4, 1, 1, '#ffffff');
  px(11, 5, 1, 2, '#d8a878');
  px(10, 7, 4, 1, gender === 'girl' ? '#e07080' : '#c06048');

  if (gender === 'girl') {
    px(11, 8, 3, 1, '#ffd040');
    px(12, 9, 1, 1, '#ffd040');
  }

  if (helm) {
    px(5, -6, 15, 10, '#8888a0');
    px(6, -5, 13, 7, '#a0a0b8');
    px(7, -9, 11, 4, '#b8b8d0');
  }
}

function buildWM(){
  stopLoop();

  if(!cv)return;
  wmFrame=0;
  if(wmLoopId){cancelAnimationFrame(wmLoopId);wmLoopId=null;}
  function wmLoop(){wmFrame++;drawWM();wmLoopId=requestAnimationFrame(wmLoop);}
  wmLoop();
  // Click handling
  cv.onclick=function(e){
    const rect=cv.getBoundingClientRect();
    const mx=(e.clientX-rect.left)*(640/rect.width);
    const my=(e.clientY-rect.top)*(480/rect.height);
    WORLDS.forEach((w,i)=>{
      const done=G.worldsDone.includes(i);
      const locked=i>0&&!G.worldsDone.includes(i-1)&&!done;
      if(locked)return;
      const pos=WM_WORLD_POS[i];
      const dx=mx-pos.x,dy=my-pos.y;
      if(dx*dx+dy*dy<28*28){sfxMenu();beginWorld(i);}

    if(mx>10&&mx<110&&my>446&&my<470){sfxMenu();buildParent();show('parentScr');}

}

function beginWorld(wIdx){
  sfxMenu();stopLoop();
  G.wIdx=wIdx;
  const r=WRANGES[wIdx];
  G.wQs=[];for(let i=r[0];i<=r[1];i++)G.wQs.push(i);
  G.qIdx=0;G.correct=0;G.wrong=0;G.streak=0;G.bossHP=100;
  // place coins on path
  const path=PATHS[wIdx]||PATHS[0];
  G.pathData=path;
  G.coins=[];
  const numQ=G.wQs.length;
  const bossQIdx=G.wQs[numQ-1];// last Q is boss Q
  const regularQs=G.wQs.slice(0,numQ-1);
  // Evenly distribute coins across the usable path (index 2 to path.length-6)
  const pathStart=2,pathEnd=path.length-6;
  const usable=pathEnd-pathStart;
  regularQs.forEach((qi,i)=>{
    const frac=regularQs.length<=1?0.5:i/(regularQs.length-1);
    const pi=Math.round(pathStart+frac*usable);
    const safeIdx=Math.max(pathStart,Math.min(pathEnd,pi));
    G.coins.push({row:path[safeIdx][0],col:path[safeIdx][1],qIdx:qi,collected:false,animT:0,isBoss:false});
  });
  // boss coin near end
  const bp=path[path.length-3];
  G.coins.push({row:bp[0],col:bp[1],qIdx:bossQIdx,collected:false,animT:0,isBoss:true});
  // pilgrim start
  G.pillar={pathIdx:0,px:path[0][1]*16,py:path[0][0]*16,frame:0};
  G.phase='walk';
  document.getElementById('qDlg').style.display='none';
  document.getElementById('bqDlg').style.display='none';
  show('owScr');
  startMapLoop();
}

// ===============================
// MAP TILES — rich world-specific layouts
// Tile codes:
//   G = grass  P = path  W = tree/obstacle
//   R = river/special fluid  S = stone/rock patch
//   F = farm/crop field  B = bush cluster anchor
//   H = house anchor (draws multi-tile building)
//   X = landmark anchor (cross, ruin, well, pillar etc.)
//   (anchors mark top-left; draw functions paint multiple tiles)
// ===============================
function buildTiles(wIdx){
  const rows=26,cols=40,m=[];
  for(let r=0;r<rows;r++)m.push(Array(cols).fill('G'));

  // ── 2-wide path ──────────────────────────────────────────
  const path=PATHS[wIdx]||PATHS[0];
  path.forEach(([r,c])=>{
    if(r>=0&&r<rows&&c>=0&&c<cols)m[r][c]='P';
    if(r>=0&&r<rows&&c+1>=0&&c+1<cols)m[r][c+1]='P';
  });

  // ── World-specific river row ──────────────────────────────
  const riverRow={0:13,1:11,2:14,3:10,4:12,5:9}[wIdx]??13;
  for(let c=0;c<cols;c++){
    if(m[riverRow][c]!=='P'&&m[riverRow+1]&&m[riverRow+1][c]!=='P'){
      m[riverRow][c]='R';
      if(riverRow+1<rows)m[riverRow+1][c]='R';
    }
  }

  // ── World-specific landmark placements ───────────────────
  const lm=WORLD_LANDMARKS[wIdx]||[];
  lm.forEach(([r,c,type])=>{
    if(r>=0&&r<rows-3&&c>=0&&c<cols-5){
      // Only place if area is clear grass
      if(m[r][c]==='G')m[r][c]=type;
    }
  });

  // ── Stone/rock patches ────────────────────────────────────
  const stones=WORLD_STONES[wIdx]||[];
  stones.forEach(([r,c])=>{
    for(let dr=0;dr<2;dr++)for(let dc=0;dc<2;dc++){
      if(r+dr<rows&&c+dc<cols&&m[r+dr][c+dc]==='G')m[r+dr][c+dc]='S';
    }
  });

  // ── Farm/crop patches ────────────────────────────────────
  const farms=WORLD_FARMS[wIdx]||[];
  farms.forEach(([r,c])=>{
    for(let dr=0;dr<3;dr++)for(let dc=0;dc<4;dc++){
      if(r+dr<rows&&c+dc<cols&&m[r+dr][c+dc]==='G')m[r+dr][c+dc]='F';
    }
  });

  // ── Bush cluster anchors ──────────────────────────────────
  const bushes=WORLD_BUSHES[wIdx]||[];
  bushes.forEach(([r,c])=>{
    if(r<rows&&c<cols&&m[r][c]==='G')m[r][c]='B';
  });

  return m;
}

// MAP LOOP
// ===============================
function stopLoop(){if(loopId){cancelAnimationFrame(loopId);loopId=null;}}

function startMapLoop(){
  tiles=buildTiles(G.wIdx);
  stopLoop();
  const owCv=document.getElementById('owCv'),spCv=document.getElementById('spCv');
  const owCtx=owCv.getContext('2d'),spCtx=spCv.getContext('2d');
  owCtx.imageSmoothingEnabled=false;spCtx.imageSmoothingEnabled=false;
  const T=16,SPEED=1.6,w=WORLDS[G.wIdx];
  function loop(){
    loopId=requestAnimationFrame(loop);
    if(G.paused)return;
    mapFrame++;
    if(G.phase==='walk'){
      const path=G.pathData;
      const ti=G.pillar.pathIdx;
      if(ti<path.length){
        const tr=path[ti][0],tc=path[ti][1];
        const tx=tc*T,ty=tr*T;
        const dx=tx-G.pillar.px,dy=ty-G.pillar.py;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<SPEED+0.5){
          G.pillar.px=tx;G.pillar.py=ty;
          const hit=G.coins.find(c=>!c.collected&&c.row===tr&&c.col===tc);
          if(hit){
            sfxCoin();hit.collected=true;
            if(hit.isBoss){G.phase='bossIntro';stopLoop();triggerBossIntro();return;}
            else{G.phase='question';openQuestion(hit.qIdx);return;}
          }
          G.pillar.pathIdx=Math.min(ti+1,path.length-1);
          if(mapFrame%10===0)sfxStep();
        }else{
          G.pillar.px+=dx/dist*SPEED;G.pillar.py+=dy/dist*SPEED;
          G.pillar.frame=Math.floor(mapFrame/8)%4;
        }
      }
    }
    const camX=Math.max(0,Math.min(G.pillar.px-300,640-640));
    const camY=Math.max(0,Math.min(G.pillar.py-220,480-480));
    drawTiles(owCtx,w,camX,camY,T);
    drawCoinsOnMap(owCtx,camX,camY,T);
    spCtx.clearRect(0,0,640,480);
    drawMapHUD(spCtx);
    drawPilgrimMap(spCtx,G.pillar.px-camX+4,G.pillar.py-camY-22,G.armorEarned,G.pillar.frame);
  }
  loop();
}

// ── 16-BIT LTTP TILE RENDERER ────────────────────────────────
function tHash(x,y){return((x*73856093)^(y*19349663))>>>0;}

function drawTiles(ctx,w,cx,cy,T){
  const rows=tiles.length,cols=tiles[0].length;
  // Pass 1: ground layer (G, P, R, S, F)
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const tx=c*T-cx,ty=r*T-cy;
      if(tx<-T*2||tx>640+T||ty<-T*2||ty>480+T)continue;
      const t=tiles[r][c],h=tHash(c,r);
      if(t==='G')tGrass(ctx,tx,ty,w,h);
      else if(t==='P')tPath(ctx,tx,ty,w,h);
      else if(t==='R')tRiver(ctx,tx,ty,w,h);
      else if(t==='S')tStone(ctx,tx,ty,w,h);
      else if(t==='F')tFarm(ctx,tx,ty,w,h);
      else if(t==='B'||t==='H'||t==='X')tGrass(ctx,tx,ty,w,h); // grass under
    }
  }
  // Pass 2: landmarks (draw big sprites at anchor tiles only)
  const drawn=new Set();
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const tx=c*T-cx,ty=r*T-cy;
      if(tx<-T*6||tx>640+T*6||ty<-T*6||ty>480+T*6)continue;
      const t=tiles[r][c];
      const key=`${r},${c}`;
      if(drawn.has(key))continue;
      if(t==='B'){drawn.add(key);tBushCluster(ctx,tx,ty,w,tHash(c,r));}
      else if(t==='H'){drawn.add(key);tHouse(ctx,tx,ty,w);}
      else if(t==='X'){drawn.add(key);tLandmark(ctx,tx,ty,w,tHash(c,r));}
      // Single trees on remaining grass borders
      else if(t==='G'&&tHash(c,r)%11===0){tTree(ctx,tx,ty,w,tHash(c,r));}
    }
  }
}

function shiftCol(hex,amt){
  const n=parseInt(hex.slice(1),16);
  const r=Math.max(0,Math.min(255,((n>>16)&255)+amt));
  const g=Math.max(0,Math.min(255,((n>>8)&255)+amt));
  const b=Math.max(0,Math.min(255,(n&255)+amt));
  return`#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

// ── GRASS ─────────────────────────────────────────────────────
function tGrass(ctx,x,y,w,h){
  const base=w.ground,lite=shiftCol(base,28),mid=shiftCol(base,10),dark=shiftCol(base,-20),xdark=shiftCol(base,-38);
  ctx.fillStyle=base;ctx.fillRect(x,y,16,16);
  const pat=h%6;
  if(pat===0){ctx.fillStyle=mid;ctx.fillRect(x,y,8,8);ctx.fillStyle=dark;ctx.fillRect(x+8,y+8,8,8);}
  else if(pat===1){ctx.fillStyle=lite;ctx.fillRect(x+2,y+2,5,4);ctx.fillStyle=dark;ctx.fillRect(x+9,y+10,5,4);}
  else if(pat===2){ctx.fillStyle=mid;ctx.fillRect(x+4,y,8,16);}
  else if(pat===3){ctx.fillStyle=lite;ctx.fillRect(x,y,16,5);ctx.fillStyle=dark;ctx.fillRect(x,y+13,16,3);}
  else if(pat===4){ctx.fillStyle=mid;ctx.fillRect(x,y,8,16);ctx.fillStyle=dark;ctx.fillRect(x+8,y,8,8);}
  else{ctx.fillStyle=lite;ctx.fillRect(x+6,y+6,5,5);ctx.fillStyle=dark;ctx.fillRect(x+1,y+11,4,4);}
  // highlights/shadows
  ctx.fillStyle=lite;ctx.fillRect(x,y,16,1);ctx.fillRect(x,y,1,16);
  ctx.fillStyle=xdark;ctx.fillRect(x,y+15,16,1);ctx.fillRect(x+15,y,1,16);
  // cross detail (like screenshot)
  if(h%5===0){ctx.fillStyle=dark;ctx.fillRect(x+7,y+4,2,8);ctx.fillRect(x+4,y+7,8,2);}
  // grass blades
  const bl=shiftCol(base,18);
  if(h%4===0){ctx.fillStyle=bl;ctx.fillRect(x+3,y+5,1,3);ctx.fillRect(x+8,y+2,1,4);ctx.fillRect(x+13,y+7,1,3);}
  // world-flavored flower dot
  if(h%9===0){const fc=w.id===0?'#f0e040':w.id===1?'#402808':w.id===2?'#e07020':w.id===3?'#c0a030':w.id===4?'#20d870':'#ffe040';ctx.fillStyle=fc;ctx.fillRect(x+6,y+7,2,2);ctx.fillRect(x+7,y+5,1,2);ctx.fillRect(x+5,y+8,2,1);ctx.fillRect(x+8,y+8,2,1);}
}

// ── PATH (2-tile wide, rich stone) ────────────────────────────
function tPath(ctx,x,y,w,h){
  const base=w.path,lite=shiftCol(base,32),mid=shiftCol(base,14),dark=shiftCol(base,-28),xdark=shiftCol(base,-48);
  ctx.fillStyle=base;ctx.fillRect(x,y,16,16);
  // offset brick pattern
  if(h%2===0){
    ctx.fillStyle=mid;ctx.fillRect(x+1,y+1,7,6);ctx.fillRect(x+9,y+9,6,5);
    ctx.fillStyle=dark;ctx.fillRect(x+9,y+1,6,6);ctx.fillRect(x+1,y+9,7,5);
  }else{
    ctx.fillStyle=mid;ctx.fillRect(x+1,y+9,7,5);ctx.fillRect(x+9,y+1,6,6);
    ctx.fillStyle=dark;ctx.fillRect(x+1,y+1,7,6);ctx.fillRect(x+9,y+9,6,5);
  }
  // mortar lines
  ctx.fillStyle=xdark;ctx.fillRect(x,y+7,16,2);ctx.fillRect(x+7,y,2,7);ctx.fillRect(x+8,y+9,2,7);
  // edge highlights
  ctx.fillStyle=lite;ctx.fillRect(x,y,16,1);ctx.fillRect(x,y,1,16);
  ctx.fillStyle=xdark;ctx.fillRect(x,y+15,16,1);ctx.fillRect(x+15,y,1,16);
  // pebble
  if(h%5===0){ctx.fillStyle=shiftCol(base,-12);ctx.fillRect(x+3,y+3,2,2);ctx.fillRect(x+11,y+11,3,2);}
  if(h%7===0){ctx.fillStyle=lite;ctx.fillRect(x+10,y+4,2,2);}
}

// ── RIVER (world-specific fluid) ──────────────────────────────
function tRiver(ctx,x,y,w,h){
  const wv=mapFrame%40<20?0:1;
  let base,lite,dark,foam;
  switch(w.id){
    case 0:base='#2868d0';lite='#5090f0';dark='#1848a0';foam='rgba(200,220,255,0.55)';break; // blue river
    case 1:base='#8c1400';lite='#cc3010';dark='#500800';foam='rgba(255,120,60,0.45)';break;  // lava
    case 2:base='#2868d0';lite='#60a0ff';dark='#1848a0';foam='rgba(200,230,255,0.55)';break; // river
    case 3:base='#404848';lite='#606870';dark='#202828';foam='rgba(180,200,200,0.4)';break;  // chasm/void
    case 4:base='#1878d8';lite='#40a8f8';dark='#0848a8';foam='rgba(180,220,255,0.6)';break;  // deep water
    default:base='#d0a820';lite='#f0d040';dark='#907010';foam='rgba(255,240,150,0.5)';        // golden river
  }
  ctx.fillStyle=base;ctx.fillRect(x,y,16,16);
  // depth bands
  ctx.fillStyle=dark;ctx.fillRect(x,y+12,16,4);
  ctx.fillStyle=shiftCol(base,-8);ctx.fillRect(x,y+8,16,4);
  // animated ripples
  ctx.fillStyle=lite;
  const r1y=y+2+wv*3,r2y=y+10-wv*2;
  ctx.fillRect(x+1,r1y,5,1);ctx.fillRect(x+8,r1y,4,1);ctx.fillRect(x+13,r1y,2,1);
  ctx.fillRect(x+3,r2y,4,1);ctx.fillRect(x+10,r2y,5,1);
  // foam edge top
  ctx.fillStyle=foam;ctx.fillRect(x,y,16,3);
  // shimmer
  if((h+mapFrame)%6<2){ctx.fillStyle='rgba(255,255,255,0.65)';ctx.fillRect(x+(h%10)+2,y+5,1,1);}
  // lava glow for world 1
  if(w.id===1&&mapFrame%20<10){ctx.fillStyle='rgba(255,180,0,0.18)';ctx.fillRect(x,y,16,16);}
}

// ── STONE PATCH ───────────────────────────────────────────────
function tStone(ctx,x,y,w,h){
  const base=w.id===3?'#504840':w.id===1?'#2a1818':'#707880';
  const lite=shiftCol(base,22),dark=shiftCol(base,-22);
  ctx.fillStyle=base;ctx.fillRect(x,y,16,16);
  // cobblestone pattern
  if(h%3===0){
    ctx.fillStyle=lite;ctx.fillRect(x+1,y+1,6,6);ctx.fillRect(x+9,y+9,6,5);
    ctx.fillStyle=dark;ctx.fillRect(x+9,y+1,6,6);ctx.fillRect(x+1,y+9,6,5);
  }else if(h%3===1){
    ctx.fillStyle=lite;ctx.fillRect(x+1,y+1,14,6);
    ctx.fillStyle=dark;ctx.fillRect(x+1,y+9,14,5);
  }else{
    ctx.fillStyle=lite;ctx.fillRect(x+1,y+1,6,14);
    ctx.fillStyle=dark;ctx.fillRect(x+9,y+1,6,14);
  }
  ctx.fillStyle=dark;ctx.fillRect(x,y+7,16,2);ctx.fillRect(x+7,y,2,16);
  ctx.fillStyle=lite;ctx.fillRect(x,y,16,1);ctx.fillRect(x,y,1,16);
  ctx.fillStyle=shiftCol(base,-35);ctx.fillRect(x,y+15,16,1);ctx.fillRect(x+15,y,1,16);
}

// ── FARM/CROP FIELD ───────────────────────────────────────────
function tFarm(ctx,x,y,w,h){
  const base1=shiftCol(w.ground,-18),base2=shiftCol(w.ground,8);
  // alternating dark/light row stripes
  const row=Math.floor(y/16);
  ctx.fillStyle=row%2===0?base1:base2;ctx.fillRect(x,y,16,16);
  ctx.fillStyle=row%2===0?base2:base1;
  ctx.fillRect(x,y,16,3);ctx.fillRect(x,y+5,16,3);ctx.fillRect(x,y+11,16,3);
  // crop dots
  ctx.fillStyle=shiftCol(w.ground,30);
  if(h%3===0){ctx.fillRect(x+2,y+1,2,2);ctx.fillRect(x+7,y+7,2,2);ctx.fillRect(x+12,y+13,2,2);}
  if(h%4===0){ctx.fillRect(x+5,y+3,2,2);ctx.fillRect(x+11,y+9,2,2);}
}

// ── BUSH CLUSTER (3-tile wide round blob) ────────────────────
function tBushCluster(ctx,x,y,w,h){
  // Use world canopy colors
  let c1,c2,c3,c4;
  switch(w.id){
    case 0:c1='#1a6010';c2='#28901c';c3='#3ab828';c4='#58e040';break;
    case 1:c1='#0a1a06';c2='#101e08';c3='#182810';c4='#203018';break;
    case 2:c1='#2a5808';c2='#408010';c3='#58a818';c4='#78d020';break;
    case 3:c1='#404018';c2='#585820';c3='#707030';c4='#909050';break;
    case 4:c1='#086028';c2='#108838';c3='#18b050';c4='#30d068';break;
    default:c1='#207030';c2='#30a040';c3='#40c850';c4='#60e870';
  }
  const T=16;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.28)';
  ctx.beginPath();ctx.ellipse(x+T*1.4,y+T*1.8,T*1.3,T*0.45,0,0,Math.PI*2);ctx.fill();

  // Three overlapping round blobs forming the cluster
  function blob(bx,by,r,col){ctx.fillStyle=col;ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);ctx.fill();}

  // Back blobs (darker)
  blob(x+T*0.9, y+T*1.1, T*0.75, c1);
  blob(x+T*2.0, y+T*1.1, T*0.75, c1);
  blob(x+T*1.45,y+T*0.7, T*0.72, c1);
  // Mid blobs
  blob(x+T*0.85,y+T*1.0, T*0.70, c2);
  blob(x+T*1.98,y+T*1.0, T*0.70, c2);
  blob(x+T*1.42,y+T*0.65,T*0.68, c2);
  // Front highlight blobs
  blob(x+T*0.82,y+T*0.92,T*0.58, c3);
  blob(x+T*1.95,y+T*0.92,T*0.58, c3);
  blob(x+T*1.40,y+T*0.58,T*0.56, c3);
  // Top sheen
  blob(x+T*0.78,y+T*0.82,T*0.34, c4);
  blob(x+T*1.90,y+T*0.82,T*0.34, c4);
  blob(x+T*1.38,y+T*0.50,T*0.32, c4);

  // Gold flower dots on bush
  ctx.fillStyle='#f8c840';
  ctx.beginPath();ctx.arc(x+T*0.7, y+T*1.1,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+T*1.4, y+T*0.55,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+T*2.1, y+T*1.0, 3,0,Math.PI*2);ctx.fill();
  // Tiny trunk stubs
  ctx.fillStyle='#6a3810';
  ctx.fillRect(x+T*0.78,y+T*1.65,5,6);
  ctx.fillRect(x+T*1.88,y+T*1.65,5,6);
}

// ── TREE (single, sparse) ────────────────────────────────────
function tTree(ctx,x,y,w,h){
  let c1,c2,c3,c4,tr1,tr2;
  switch(w.id){
    case 0:c1='#145210';c2='#1e7018';c3='#30a020';c4='#50c838';tr1='#6a3810';tr2='#885020';break;
    case 1:c1='#0a1a06';c2='#142808';c3='#1e3a10';c4='#284e18';tr1='#2a1808';tr2='#3a2010';break;
    case 2:c1='#486010';c2='#608018';c3='#88a820';c4='#a8c828';tr1='#604020';tr2='#805030';break;
    case 3:c1='#505020';c2='#707030';c3='#909040';c4='#b0b050';tr1='#604830';tr2='#806040';break;
    case 4:c1='#086030';c2='#108840';c3='#18b050';c4='#30d868';tr1='#205030';tr2='#308040';break;
    default:c1='#188028';c2='#28b040';c3='#40d060';c4='#60e880';tr1='#806040';tr2='#a08050';
  }
  ctx.fillStyle='rgba(0,0,0,0.2)';ctx.beginPath();ctx.ellipse(x+8,y+15,7,2,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=tr1;ctx.fillRect(x+5,y+10,6,7);ctx.fillStyle=tr2;ctx.fillRect(x+6,y+10,3,6);
  ctx.fillStyle=c1;ctx.fillRect(x,y+10,16,4);
  ctx.fillStyle=c2;ctx.fillRect(x+1,y+7,14,5);ctx.fillStyle=c1;ctx.fillRect(x+1,y+7,1,4);ctx.fillRect(x+14,y+7,1,4);
  ctx.fillStyle=c3;ctx.fillRect(x+2,y+4,12,5);ctx.fillStyle=c2;ctx.fillRect(x+2,y+4,1,4);ctx.fillRect(x+13,y+4,1,4);
  ctx.fillStyle=c3;ctx.fillRect(x+4,y+1,8,5);ctx.fillStyle=c4;ctx.fillRect(x+5,y+1,6,4);ctx.fillStyle=c4;ctx.fillRect(x+6,y,4,3);
  ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(x+4,y+2,4,3);
}

// ── HOUSE (multi-tile building, 5×3 tiles) ────────────────────
function tHouse(ctx,x,y,w){
  const T=16;
  const W=5*T, H=3*T; // 80×48 px

  // World-specific house style
  let wallC,wallH,roofC,roofH,roofD,winC,doorC,trimC;
  switch(w.id){
    case 0:wallC='#c8b070';wallH='#e0c888';roofC='#882018';roofH='#b02820';roofD='#601010';winC='#90c8f0';doorC='#603010';trimC='#a08040';break;
    case 1:wallC='#302820';wallH='#402e24';roofC='#180c08';roofH='#281408';roofD='#100806';winC='#ff6020';doorC='#180c06';trimC='#241808';break;
    case 2:wallC='#c8b888';wallH='#e0d0a0';roofC='#506030';roofH='#708040';roofD='#304020';winC='#a0c8e0';doorC='#5a3818';trimC='#908060';break;
    case 3:wallC='#807060';wallH='#a09080';roofC='#504038';roofH='#685448';roofD='#382820';winC='#c0d8e0';doorC='#3a2818';trimC='#605040';break;
    case 4:wallC='#a8b870';wallH='#c0d080';roofC='#205840';roofH='#288050';roofD='#103828';winC='#80e0f0';doorC='#183020';trimC='#608050';break;
    default:wallC='#e0d090';wallH='#f0e0a8';roofC='#c0a020';roofH='#e0c030';roofD='#908010';winC='#ffffa0';doorC='#806000';trimC='#c0a828';
  }

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(x+4,y+H-2,W,6);

  // Foundation
  ctx.fillStyle=shiftCol(wallC,-30);ctx.fillRect(x,y+H-8,W,8);

  // Walls
  ctx.fillStyle=wallC;ctx.fillRect(x,y+T,W,H-T-8);
  ctx.fillStyle=wallH;ctx.fillRect(x+2,y+T+2,W-4,8);// highlight band

  // Roof (triangular, 2 slopes)
  // Left slope
  ctx.fillStyle=roofH;
  for(let i=0;i<T+4;i++){
    const rw=W-i*2;
    ctx.fillRect(x+i,y+T-i,rw,2);
  }
  ctx.fillStyle=roofC;
  for(let i=0;i<T+4;i++){
    const rw=W-i*2;
    ctx.fillRect(x+i+rw/2-2,y+T-i,2,2);// ridge
  }
  // Roof dark underside / eave
  ctx.fillStyle=roofD;ctx.fillRect(x-2,y+T,W+4,4);
  ctx.fillStyle=shiftCol(roofD,20);ctx.fillRect(x,y+T,W,2);

  // Chimney
  ctx.fillStyle=shiftCol(wallC,-20);ctx.fillRect(x+W-20,y+T-22,10,20);
  ctx.fillStyle=shiftCol(wallC,-35);ctx.fillRect(x+W-22,y+T-24,14,4);
  // smoke puff
  ctx.fillStyle='rgba(180,180,190,0.5)';ctx.beginPath();ctx.arc(x+W-15,y+T-28,4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+W-12,y+T-34,3,0,Math.PI*2);ctx.fill();

  // Windows (2)
  const winY=y+T+10;
  function window_(wx){
    ctx.fillStyle=shiftCol(trimC,-10);ctx.fillRect(wx-2,winY-2,18,18);
    ctx.fillStyle=winC;ctx.fillRect(wx,winY,14,14);
    ctx.fillStyle='rgba(255,255,200,0.3)';ctx.fillRect(wx+1,winY+1,6,6);// glare
    ctx.fillStyle=shiftCol(winC,-30);ctx.fillRect(wx+7,winY,1,14);ctx.fillRect(wx,winY+7,14,1);
    // sill
    ctx.fillStyle=trimC;ctx.fillRect(wx-2,winY+14,18,3);
  }
  window_(x+8);window_(x+W-26);

  // Door (centered)
  const dx=x+Math.floor(W/2)-8;
  ctx.fillStyle=shiftCol(trimC,-10);ctx.fillRect(dx-2,y+H-28,20,28);
  ctx.fillStyle=doorC;ctx.fillRect(dx,y+H-26,16,26);
  ctx.fillStyle=shiftCol(doorC,30);ctx.fillRect(dx+1,y+H-25,7,12);// highlight panel
  ctx.fillStyle='#f8c840';ctx.beginPath();ctx.arc(dx+13,y+H-14,2,0,Math.PI*2);ctx.fill();// knob
  // door arch
  ctx.fillStyle=shiftCol(trimC,10);
  ctx.beginPath();ctx.arc(dx+8,y+H-26,10,Math.PI,0);ctx.fill();
  ctx.fillStyle=doorC;ctx.beginPath();ctx.arc(dx+8,y+H-26,8,Math.PI,0);ctx.fill();

  // Wall texture lines
  ctx.fillStyle=shiftCol(wallC,-12);
  for(let wy=y+T+6;wy<y+H-8;wy+=8)ctx.fillRect(x+2,wy,W-4,1);
}

// ── LANDMARK (world-specific: cross/ruin/well/altar/pillar) ──
function tLandmark(ctx,x,y,w,h){
  const T=16;
  switch(w.id){
    case 0: tLandmarkWell(ctx,x,y,T); break;
    case 1: tLandmarkRuin(ctx,x,y,T,h); break;
    case 2: tLandmarkCross(ctx,x,y,T); break;
    case 3: tLandmarkAltar(ctx,x,y,T); break;
    case 4: tLandmarkWell(ctx,x,y,T); break;
    case 5: tLandmarkPillar(ctx,x,y,T); break;
    default: tLandmarkCross(ctx,x,y,T);
  }
}

function tLandmarkCross(ctx,x,y,T){
  // Large stone cross, 2×3 tiles
  const cx=x+T,cy=y;
  ctx.fillStyle='rgba(0,0,0,0.25)';ctx.fillRect(cx+4,cy+3*T-6,24,8);
  // base
  ctx.fillStyle='#807060';ctx.fillRect(cx,cy+2*T+4,24,16);
  ctx.fillStyle='#a09080';ctx.fillRect(cx+2,cy+2*T+4,20,6);
  // vertical beam
  ctx.fillStyle='#909888';ctx.fillRect(cx+8,cy,8,2*T+8);
  ctx.fillStyle='#b0b8a8';ctx.fillRect(cx+9,cy+2,5,2*T+4);
  ctx.fillStyle='#707868';ctx.fillRect(cx+14,cy,2,2*T+8);
  // horizontal beam
  ctx.fillStyle='#909888';ctx.fillRect(cx,cy+T-4,24,10);
  ctx.fillStyle='#b0b8a8';ctx.fillRect(cx+2,cy+T-3,20,5);
  ctx.fillStyle='#707868';ctx.fillRect(cx,cy+T+3,24,3);
}

function tLandmarkWell(ctx,x,y,T){
  // Stone well, 2×2 tiles
  const cx=x+4,cy=y+6;
  ctx.fillStyle='rgba(0,0,0,0.22)';ctx.fillRect(cx+2,cy+T+16,28,6);
  // well base (stone ring)
  ctx.fillStyle='#909090';ctx.fillRect(cx,cy+12,28,16);
  ctx.fillStyle='#b0b0b0';ctx.fillRect(cx+2,cy+12,24,6);
  ctx.fillStyle='#707070';ctx.fillRect(cx,cy+20,28,8);
  // stone blocks
  ctx.fillStyle='#808080';ctx.fillRect(cx+7,cy+12,2,16);ctx.fillRect(cx+14,cy+12,2,16);ctx.fillRect(cx+21,cy+12,2,16);
  // roof posts
  ctx.fillStyle='#6a4020';ctx.fillRect(cx+2,cy,4,14);ctx.fillRect(cx+22,cy,4,14);
  // roof
  ctx.fillStyle='#882018';ctx.fillRect(cx-2,cy-2,32,6);
  ctx.fillStyle='#b02820';ctx.fillRect(cx,cy-2,28,4);
  // crossbar + rope
  ctx.fillStyle='#a06030';ctx.fillRect(cx+4,cy+2,20,3);
  ctx.fillStyle='#604010';ctx.fillRect(cx+13,cy+5,2,8);
  // bucket
  ctx.fillStyle='#806040';ctx.fillRect(cx+10,cy+11,6,5);
  ctx.fillStyle='#a08060';ctx.fillRect(cx+11,cy+11,4,3);
}

function tLandmarkRuin(ctx,x,y,T,h){
  // Crumbling ruin wall, 3×2 tiles
  const cx=x,cy=y+4;
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(cx+4,cy+2*T-4,40,8);
  // rubble on ground
  ctx.fillStyle='#302820';
  for(let i=0;i<6;i++)ctx.fillRect(cx+i*7+2,cy+2*T-8,(h+i)%4+3,(h+i)%3+2);
  // left broken wall section
  ctx.fillStyle='#3a2818';ctx.fillRect(cx,cy,14,2*T);
  ctx.fillStyle='#4a3020';ctx.fillRect(cx+2,cy+2,10,8);
  ctx.fillStyle='#2a1810';ctx.fillRect(cx,cy,14,3);
  // cracks
  ctx.fillStyle='#1a1008';ctx.fillRect(cx+5,cy+8,1,16);ctx.fillRect(cx+9,cy+4,1,12);
  // right broken stub
  ctx.fillStyle='#3a2818';ctx.fillRect(cx+28,cy+T-4,18,T+4);
  ctx.fillStyle='#2a1810';ctx.fillRect(cx+28,cy+T-4,18,3);
  ctx.fillStyle='#1a1008';ctx.fillRect(cx+35,cy+T,1,T);
  // vine/moss
  ctx.fillStyle='#1a3808';ctx.fillRect(cx+2,cy+T,3,T-4);ctx.fillRect(cx+30,cy+T+4,3,8);
}

function tLandmarkAltar(ctx,x,y,T){
  // Stone altar with flame, 2×2 tiles
  const cx=x+4,cy=y+8;
  ctx.fillStyle='rgba(0,0,0,0.28)';ctx.fillRect(cx,cy+T+14,28,7);
  // altar base
  ctx.fillStyle='#706050';ctx.fillRect(cx,cy+T-2,28,18);

function tLandmarkPillar(ctx,x,y,T){
  // Two golden pillars with arch, 3×3 tiles
  const cx=x,cy=y;
  ctx.fillStyle='rgba(0,0,0,0.25)';ctx.fillRect(cx+4,cy+3*T-4,40,8);
  // Left pillar
  function pillar(px){
    ctx.fillStyle='#a08020';ctx.fillRect(px,cy+8,14,3*T-12);

    ctx.fillStyle='#d8b838';ctx.fillRect(px,cy+4,14,4);
    // base

    ctx.fillStyle='#d8b838';ctx.fillRect(px,cy+3*T-10,14,4);
  }
  pillar(cx+4);pillar(cx+30);
  // Arch connecting
  ctx.fillStyle='#a08020';
  for(let i=0;i<22;i++){

  }
  ctx.fillStyle='#e8c840';

  ctx.fillStyle='rgba(255,240,80,0.35)';

  ctx.fillStyle='rgba(255,255,180,0.6)';ctx.fillRect(cx+22,cy-5,2,2);
}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}


function openQuestion(qIdx){
  G.activeQ=QS[qIdx];G.blankIdx=0;G.filledBlanks=[];
  G.typedAns='';G.wbSel=0;
  G.wordBank=buildWordBank(G.activeQ.blanks,0);
  G.phase='question';
  document.getElementById('qDlg').style.display='block';
  renderQDlg();
}

function renderQDlg(){
  const cv=document.getElementById('qCv'),ctx=cv.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  ctx.clearRect(0,0,640,230);
  ctx.fillStyle='rgba(0,0,12,0.97)';ctx.fillRect(0,0,640,230);
  ctx.fillStyle='#f8c840';ctx.fillRect(0,0,640,3);
  // coin icon
  ctx.fillStyle='#f8c840';ctx.beginPath();ctx.arc(20,22,12,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';ctx.font='bold 12px monospace';ctx.textAlign='center';ctx.fillText('?',20,26);
  // Q label
  ctx.fillStyle='#f8c840';ctx.font='bold 11px monospace';ctx.textAlign='left';
  const qNum=G.wQs.indexOf(G.wQs.find(q=>QS[q]===G.activeQ))+1;
  ctx.fillText('Q'+qNum+' — FILL IN THE BLANK'+(G.activeQ.blanks.length>1?'S':''),38,17);
  // blank progress
  ctx.fillStyle='#606080';ctx.font='9px monospace';
  ctx.fillText('Blank '+(G.blankIdx+1)+' of '+G.activeQ.blanks.length,38,29);
  ctx.fillStyle='#202050';ctx.fillRect(0,34,640,1);
  // question
  ctx.fillStyle='#c0d0ff';ctx.font='14px monospace';
  wrapText(ctx,G.activeQ.q,10,52,620,16);
  ctx.fillStyle='#202050';ctx.fillRect(0,72,640,1);
  // answer display with blanks
  ctx.fillStyle='#80ff80';ctx.font='bold 13px monospace';
  ctx.fillText('ANSWER:',10,88);
  renderBlankDisplay(ctx,G.activeQ,G.filledBlanks,G.blankIdx,10,104,620);
  // input
  if(G.diff==='young')renderWB(ctx,G.wordBank,G.wbSel,10,150);
  else renderTypeBox(ctx,G.typedAns,10,150);
  // hint
  ctx.fillStyle='#303055';ctx.font='9px monospace';ctx.textAlign='right';
  ctx.fillText(G.diff==='young'?'← → to move, ENTER to select':'ENTER to confirm blank, ESC to skip (-1 life)',630,224);
}

function renderBlankDisplay(ctx,q,filled,currentBlank,x,y,maxW){
  const parts=q.dp.split('___');
  let cx=x;
  ctx.font='12px monospace';ctx.textAlign='left';
  parts.forEach((part,i)=>{
    // Wrap before text segment if it would overflow — split at spaces to find break point
    ctx.fillStyle='#f0f0ff';
    const words=part.split(' ');
    words.forEach((word,wi)=>{
      const token=(wi===0?'':' ')+word;
      const tw=ctx.measureText(token).width;
      if(cx+tw>maxW+x-4&&cx>x+20){cx=x+16;y+=22;}
      ctx.fillText(token,cx,y);
      cx+=tw;
    });
    if(i<q.blanks.length){
      ctx.font='11px monospace';
      const ansW=ctx.measureText(q.blanks[i]).width;
      const bw=Math.max(70,ansW+28);
      ctx.font='12px monospace';
      // Wrap before blank box if it would overflow
      if(cx+bw>maxW+x-4){cx=x+16;y+=22;}
      const isFilled=i<filled.length;
      const isCurrent=i===currentBlank;
      ctx.fillStyle=isFilled?'#002800':isCurrent?'#000820':'#08080a';
      ctx.fillRect(cx,y-14,bw,18);
      ctx.strokeStyle=isFilled?'#30c030':isCurrent?'#f8c840':'#5050a0';
      ctx.lineWidth=2;ctx.strokeRect(cx,y-14,bw,18);
      if(isFilled){
        ctx.fillStyle='#60ff60';ctx.font='11px monospace';ctx.textAlign='left';
        ctx.save();ctx.beginPath();ctx.rect(cx+2,y-14,bw-4,18);ctx.clip();
        ctx.fillText(filled[i],cx+4,y);
        ctx.restore();
      } else if(isCurrent){
        ctx.fillStyle='#f8c840';ctx.font='10px monospace';ctx.textAlign='left';
        ctx.fillText('▶ type here',cx+4,y);
      }
      cx+=bw+6;
      ctx.font='12px monospace';
    }
  });
}

function renderWB(ctx,bank,sel,x,y){
  ctx.fillStyle='#f8c840';ctx.font='bold 10px monospace';ctx.textAlign='left';
  ctx.fillText('WORD BANK — pick the right word:',x,y-5);
  // Measure max word width to decide layout
  ctx.font='11px monospace';
  const maxWordW=Math.max(...bank.map(w=>ctx.measureText(w).width));
  const useTwo=maxWordW>90||bank.some(w=>w.length>11);
  if(useTwo){
    // 2x2 grid
    const bw=292,bh=26,gap=6;
    bank.forEach((word,i)=>{
      const col=i%2,row=Math.floor(i/2);
      const bx=x+col*(bw+gap),by=y+4+row*(bh+gap);
      const isSel=sel===i;
      ctx.fillStyle=isSel?'#0a280a':'#04040e';ctx.fillRect(bx,by,bw,bh);
      ctx.strokeStyle=isSel?'#f8c840':'#404080';ctx.lineWidth=2;ctx.strokeRect(bx,by,bw,bh);
      if(isSel){ctx.fillStyle='rgba(248,200,64,0.12)';ctx.fillRect(bx,by,bw,bh);}
      ctx.fillStyle=isSel?'#f8c840':'#404060';ctx.font='8px monospace';ctx.textAlign='left';
      ctx.fillText((i+1)+'',bx+4,by+9);
      ctx.fillStyle=isSel?'#f8c840':'#c0c0ff';ctx.font='11px monospace';ctx.textAlign='center';
      ctx.save();ctx.beginPath();ctx.rect(bx+2,by,bw-4,bh);ctx.clip();
      ctx.fillText(word,bx+bw/2,by+18);ctx.restore();
    });
  }else{
    // single row of 4
    const bw=142,bh=30,gap=6;
    bank.forEach((word,i)=>{
      const bx=x+i*(bw+gap),by=y+4;
      const isSel=sel===i;
      ctx.fillStyle=isSel?'#0a280a':'#04040e';ctx.fillRect(bx,by,bw,bh);
      ctx.strokeStyle=isSel?'#f8c840':'#404080';ctx.lineWidth=2;ctx.strokeRect(bx,by,bw,bh);
      if(isSel){ctx.fillStyle='rgba(248,200,64,0.12)';ctx.fillRect(bx,by,bw,bh);}
      ctx.fillStyle=isSel?'#f8c840':'#404060';ctx.font='8px monospace';ctx.textAlign='left';
      ctx.fillText((i+1)+'',bx+4,by+10);
      ctx.fillStyle=isSel?'#f8c840':'#c0c0ff';ctx.font='11px monospace';ctx.textAlign='center';
      ctx.save();ctx.beginPath();ctx.rect(bx+2,by,bw-4,bh);ctx.clip();
      ctx.fillText(word,bx+bw/2,by+20);ctx.restore();
    });
  }
}

function renderTypeBox(ctx,typed,x,y){
  ctx.fillStyle='rgba(0,0,20,0.9)';ctx.fillRect(x,y,460,26);
  ctx.strokeStyle='#4040a0';ctx.lineWidth=2;ctx.strokeRect(x,y,460,26);
  ctx.fillStyle='#c0c0ff';ctx.font='13px monospace';ctx.textAlign='left';
  ctx.fillText(typed+(Math.floor(Date.now()/500)%2?'|':''),x+6,y+18);
}

function wrapText(ctx,text,x,y,maxW,lh){
  ctx.textAlign='left';
  const words=text.split(' ');let line='',cy=y;
  words.forEach(w=>{const t=line?line+' '+w:w;if(ctx.measureText(t).width>maxW&&line){ctx.fillText(line,x,cy);cy+=lh;line=w;}else line=t;});
  if(line)ctx.fillText(line,x,cy);
}

// ─── Submit one blank ─────────────────────────────────────
function submitBlank(answer){
  const correct=G.activeQ.blanks[G.blankIdx];
  const ok=answer.toLowerCase().trim()===correct.toLowerCase().trim();
  if(ok){
    sfxBlankOk();flash('#00aa00',0.18);
    G.filledBlanks.push(answer);
    G.blankIdx++;
    if(G.blankIdx>=G.activeQ.blanks.length){
      // all blanks filled — correct!
      sfxOk();flash('#00ff00',0.25);
      G.score+=50+(G.streak>=2?25:0);G.streak++;G.correct++;G.qIdx++;G.totalAnswered++;
      showQFeedback(true);
    }else{
      // next blank
      G.wbSel=0;G.typedAns='';
      G.wordBank=buildWordBank(G.activeQ.blanks,G.blankIdx);
      renderQDlg();
    }
  }else{
    // wrong on any blank — question failed
    sfxBad();flash('#ff0000',0.3);
    G.lives=Math.max(0,G.lives-1);G.streak=0;G.wrong++;G.totalAnswered++;
    showQFeedback(false);
  }
}

function showQFeedback(good){
  const cv=document.getElementById('qCv'),ctx=cv.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  ctx.fillStyle=good?'rgba(0,28,0,0.97)':'rgba(28,0,0,0.97)';ctx.fillRect(0,0,640,230);
  ctx.fillStyle=good?'#20a020':'#a02020';ctx.fillRect(0,0,640,3);
  ctx.fillStyle=good?'#60ff60':'#ff6060';ctx.font='bold 20px monospace';ctx.textAlign='center';
  ctx.fillText(good?'✓ CORRECT!':'✗ WRONG!',320,40);
  ctx.fillStyle='#c0c0ff';ctx.font='11px monospace';ctx.textAlign='center';
  ctx.fillText('Full answer:',320,64);
  // Draw answer text centered — measure first to find starting x
  ctx.fillStyle='#f8c840';ctx.font='bold 12px monospace';
  const maxW=560,lh=18,margin=40;
  // Split into lines first, then center each line
  const words=G.activeQ.full.split(' ');
  let lines=[],line='';
  words.forEach(w=>{const t=line?line+' '+w:w;if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=w;}else line=t;});
  if(line)lines.push(line);
  let ty=86;
  lines.forEach(l=>{ctx.textAlign='center';ctx.fillText(l,320,ty);ty+=lh;});
  // On wrong answer: highlight which blank was missed
  if(!good){
    const correctWord=G.activeQ.blanks[G.blankIdx];
    const ry=ty+4;
    ctx.fillStyle='rgba(0,40,0,0.92)';ctx.fillRect(100,ry,440,26);
    ctx.strokeStyle='#30ff60';ctx.lineWidth=2;ctx.strokeRect(100,ry,440,26);
    ctx.fillStyle='#30ff60';ctx.font='bold 11px monospace';ctx.textAlign='center';
    ctx.fillText('✓ Blank '+(G.blankIdx+1)+': "'+correctWord+'"',320,ry+17);
    // lives remaining pip display
    const livesY=ry+36;
    ctx.fillStyle='#606080';ctx.font='9px monospace';ctx.fillText('Lives remaining:',220,livesY);
    for(let i=0;i<3;i++){ctx.fillStyle=i<G.lives?'#e03030':'#301010';ctx.beginPath();ctx.arc(338+i*22,livesY-5,7,0,Math.PI*2);ctx.arc(338+i*22+8,livesY-5,7,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.moveTo(338+i*22-7,livesY-4);ctx.lineTo(338+i*22+4,livesY+4);ctx.lineTo(338+i*22+15,livesY-4);ctx.closePath();ctx.fill();}
  }
  if(good&&G.streak>=3){ctx.fillStyle='#ff8020';ctx.font='bold 12px monospace';ctx.textAlign='center';ctx.fillText('🔥 '+G.streak+'x STREAK! +25 BONUS!',320,148);}
  ctx.fillStyle='#404060';ctx.font='10px monospace';ctx.textAlign='center';ctx.fillText('continuing...',320,218);
  const delay=good?1800:2400;
  setTimeout(()=>{
    document.getElementById('qDlg').style.display='none';
    G.activeQ=null;G.filledBlanks=[];G.blankIdx=0;
    if(!good&&G.lives<=0){endWorld(false);return;}
    G.phase='walk';startMapLoop();
  },delay);
}

// ─── Keyboard for questions + pause ──────────────────────
document.addEventListener('keydown',e=>{
  // DEV SHORTCUT: Shift+B = jump straight to boss battle of current world (or world 0)
  if(e.shiftKey&&e.key==='B'){
    if(!G.name){G.name='DEV';G.gender='boy';G.diff='young';G.score=0;G.lives=3;G.worldsDone=[];G.armorEarned=[];G.totalAnswered=0;}
    const wi=G.wIdx||0;
    G.wIdx=wi;const r=WRANGES[wi];G.wQs=[];for(let i=r[0];i<=r[1];i++)G.wQs.push(i);
    G.qIdx=0;G.correct=0;G.wrong=0;G.streak=0;G.bossHP=100;
    stopLoop();show('bossBattleScr');startBossBattle();return;
  }
  // P key toggles pause (any phase except title/name/result)
  if((e.key==='p'||e.key==='P')&&['walk','question','boss'].includes(G.phase)){
    if(G.paused)resumeGame();else pauseGame();
    return;
  }
  // Escape pauses when not in a question (ESC in question = skip)
  if(e.key==='Escape'&&G.phase==='walk'){
    if(G.paused)resumeGame();else pauseGame();
    return;
  }
  // Resume on Escape if paused mid-question or mid-boss
  if(e.key==='Escape'&&G.paused){resumeGame();return;}
  // regular question
  if(G.phase==='question'&&G.activeQ){
    if(e.key==='Escape'){skipQ();return;}
    if(G.diff==='young'){
      if(e.key==='ArrowLeft'){G.wbSel=Math.max(0,G.wbSel-1);renderQDlg();}
      else if(e.key==='ArrowRight'){G.wbSel=Math.min(G.wordBank.length-1,G.wbSel+1);renderQDlg();}
      else if(e.key>='1'&&e.key<='4'){const i=parseInt(e.key)-1;if(i<G.wordBank.length){G.wbSel=i;sfxMenu();renderQDlg();}}
      else if(e.key==='Enter'){e.preventDefault();submitBlank(G.wordBank[G.wbSel]);}
    }else{
      if(e.key==='Backspace'){G.typedAns=G.typedAns.slice(0,-1);renderQDlg();}
      else if(e.key==='Enter'){e.preventDefault();submitBlank(G.typedAns);}
      else if(e.key.length===1){G.typedAns+=e.key;renderQDlg();}
    }
  }
  // boss question — only when the question dialog is actually visible
  if(G.phase==='boss'&&G.bossQ&&document.getElementById('bqDlg').style.display!=='none'){
    if(G.diff==='young'){
      if(e.key==='ArrowLeft'){G.bossSel=Math.max(0,G.bossSel-1);renderBQDlg();}
      else if(e.key==='ArrowRight'){G.bossSel=Math.min(G.bossWB.length-1,G.bossSel+1);renderBQDlg();}
      else if(e.key>='1'&&e.key<='4'){const i=parseInt(e.key)-1;if(i<G.bossWB.length){G.bossSel=i;sfxMenu();renderBQDlg();}}
      else if(e.key==='Enter'){e.preventDefault();submitBossBlank(G.bossWB[G.bossSel]);}
    }else{
      if(e.key==='Backspace'){G.bossTyped=G.bossTyped.slice(0,-1);renderBQDlg();}
      else if(e.key==='Enter'){e.preventDefault();submitBossBlank(G.bossTyped);}
      else if(e.key.length===1){G.bossTyped+=e.key;renderBQDlg();}
    }
  }
});

document.getElementById('qCv').addEventListener('click',e=>{
  if(G.phase!=='question'||!G.activeQ)return;
  if(G.diff!=='young')return;
  const rect=e.target.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(640/rect.width);
  const my=(e.clientY-rect.top)*(230/rect.height);
  // detect layout
  const ctx=document.getElementById('qCv').getContext('2d');
  ctx.font='11px monospace';
  const maxW=Math.max(...G.wordBank.map(w=>ctx.measureText(w).width));
  const useTwo=maxW>90||G.wordBank.some(w=>w.length>11);
  if(useTwo){
    const bw=292,bh=26,gap=6,sx=10,sy=154;
    for(let i=0;i<G.wordBank.length;i++){
      const col=i%2,row=Math.floor(i/2);
      const bx=sx+col*(bw+gap),by=sy+row*(bh+gap);
      if(mx>=bx&&mx<=bx+bw&&my>=by&&my<=by+bh){G.wbSel=i;sfxMenu();renderQDlg();break;}
    }
  }else{
    const bw=142,gap=6,sx=10;
    if(my>=154&&my<=188){
      const i=Math.floor((mx-sx)/(bw+gap));
      if(i>=0&&i<G.wordBank.length){G.wbSel=i;sfxMenu();renderQDlg();}
    }
  }
});

  ctx.save();

  ctx.translate(bx, by);

  switch(bossId) {
    case 0: { // THE DOUBTER - Crimson Knight

      ctx.fillStyle='#A00'; ctx.fillRect(12,10,8,10); ctx.fillRect(32,10,8,10);
      ctx.fillStyle='#F44'; ctx.fillRect(19,18,14,8);
      ctx.fillStyle='#FF0'; ctx.fillRect(22,20,4,4); ctx.fillRect(29,20,4,4);
      // Sword — animated swing, pivot at guard (51,28)
      const swingA = Math.sin(frame*0.14)*0.9;
      ctx.save();
      ctx.translate(51,28);
      ctx.rotate(swingA);
      for(let i=1;i<=5;i++){ctx.save();ctx.rotate(-swingA*i*0.18);ctx.globalAlpha=0.07*(6-i);ctx.fillStyle='#fff4a0';ctx.fillRect(-2,-22,4,26);ctx.restore();}
      ctx.globalAlpha=1;
      ctx.fillStyle='#CCC'; ctx.fillRect(-2,-22,5,26);
      ctx.fillStyle='#EEE'; ctx.fillRect(-1,-22,2,10);
      ctx.fillStyle='#FF0'; ctx.fillRect(-5,-2,11,5);
      ctx.fillStyle='rgba(200,230,255,0.6)'; ctx.fillRect(-1,-20,2,8);
      ctx.restore();
      break;
    }
    case 1: { // OLD SERPENT
      ctx.fillStyle='#031'; ctx.fillRect(6,34,48,26);
      ctx.fillStyle='#063'; ctx.fillRect(10,36,42,20);
      ctx.fillStyle='#094'; for(let i=0;i<8;i++){ctx.fillRect(12+i*5,38,3,4);ctx.fillRect(14+i*5,44,3,4);}
      ctx.fillStyle='#052'; ctx.fillRect(48,22,32,24);
      ctx.fillStyle='#0A4'; ctx.fillRect(52,25,26,18);
      // Forked tongue lashes from snout tip

        ctx.strokeStyle='#ff1010'; ctx.lineWidth=2;

        ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(tx+tLen,ty+3); ctx.stroke();
        ctx.fillStyle='#ff2020';
        ctx.beginPath(); ctx.arc(tx+tLen,ty-3,2,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(tx+tLen,ty+3,2,0,Math.PI*2); ctx.fill();
      }
      ctx.fillStyle='#FF0'; ctx.fillRect(68,28,8,7);
      ctx.fillStyle='#000'; ctx.fillRect(70,30,4,3);
      break;
    }
    case 2: { // THE ACCUSER
      ctx.fillStyle='#822'; ctx.fillRect(12,30,38,38);
      ctx.fillStyle='#B22'; ctx.fillRect(14,32,34,14);
      ctx.fillStyle='#F60'; ctx.fillRect(16,34,30,6);
      ctx.fillStyle='#400'; ctx.fillRect(18,12,26,18);
      ctx.fillStyle='#F44'; ctx.fillRect(21,16,20,10);
      ctx.fillStyle='#FF0'; ctx.fillRect(24,18,4,4); ctx.fillRect(33,18,4,4);
      // Pointing arm jabs out from left side
      const jabX = Math.max(0,Math.sin(frame*0.12))*14;
      ctx.save(); ctx.translate(jabX,0);
      ctx.fillStyle='#822'; ctx.fillRect(-4,32,8,10);   // arm
      ctx.fillStyle='#F44'; ctx.fillRect(-8,30,7,14);   // hand
      ctx.fillStyle='#F88'; ctx.fillRect(-8,27,6,7);    // pointing finger
      ctx.fillStyle='rgba(255,80,20,0.35)'; ctx.beginPath(); ctx.arc(-5,30,10,0,Math.PI*2); ctx.fill();
      ctx.restore();
      break;
    }
    case 3: { // THE IDOL KING
      ctx.fillStyle='#222'; ctx.fillRect(8,22,46,52);
      ctx.fillStyle='#555'; ctx.fillRect(12,28,38,14);
      ctx.fillStyle='#777'; ctx.fillRect(14,40,34,12);
      ctx.fillStyle='#333'; ctx.fillRect(14,10,32,18);
      // Crown glow pulse
      const cp=Math.sin(frame*0.16)*0.4+0.7;
      ctx.fillStyle=`rgba(255,200,0,${cp*0.5})`; ctx.beginPath(); ctx.arc(31,8,24,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=`rgba(255,230,80,${cp*0.85})`; ctx.beginPath(); ctx.arc(31,8,11,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#FF0'; ctx.fillRect(21,15,6,6); ctx.fillRect(33,15,6,6);
      ctx.fillStyle='#CA0'; ctx.fillRect(14,6,36,6);
      // Orbiting rune dots
      for(let i=0;i<3;i++){const a=frame*0.05+i*Math.PI*0.66;ctx.fillStyle=`rgba(255,200,0,${cp})`;ctx.beginPath();ctx.arc(31+Math.cos(a)*22,8+Math.sin(a)*9,3,0,Math.PI*2);ctx.fill();}
      break;
    }
    case 4: { // THE DECEIVER
      ctx.fillStyle='#111'; ctx.fillRect(10,26,42,46);
      ctx.fillStyle='#DAA520'; ctx.fillRect(14,36,36,8);
      ctx.fillStyle='#222'; ctx.fillRect(16,16,30,22);

      ctx.fillStyle='#0FF'; ctx.fillRect(26,25,5,5); ctx.fillRect(33,25,5,5);

      if(frame%6<2){
        ctx.save(); ctx.globalCompositeOperation='screen'; ctx.globalAlpha=0.2;
        ctx.fillStyle='#ff0000'; ctx.fillRect(12,16,46,56);
        ctx.globalAlpha=0.12;
        ctx.fillStyle='#0000ff'; ctx.fillRect(8,16,46,56);
        ctx.restore();
      }
      // Scan lines
      for(let i=0;i<4;i++){const ly=16+((frame*3+i*14)%56);ctx.fillStyle='rgba(0,255,200,0.1)';ctx.fillRect(10,ly,42,2);}
      break;
    }
    case 5: { // DEATH & DESPAIR
      ctx.fillStyle='#444'; ctx.fillRect(12,28,38,42);
      ctx.fillStyle='#AAA'; ctx.fillRect(16,32,12,10); ctx.fillRect(30,32,12,10);
      ctx.fillStyle='#DDD'; ctx.fillRect(18,14,26,22);
      // Pulsing red eyes
      const ep=Math.sin(frame*0.2)*0.5+0.6;
      ctx.fillStyle=`rgba(255,0,0,${ep*0.8})`; ctx.fillRect(23,18,5,6); ctx.fillRect(33,18,5,6);
      ctx.fillStyle=`rgba(255,100,100,${ep})`; ctx.fillRect(24,19,3,4); ctx.fillRect(34,19,3,4);
      ctx.fillStyle='#F00'; ctx.fillRect(24,26,12,4);
      // Soul wisps rising from shoulders
      for(let i=0;i<3;i++){const wy=28-((frame*0.5+i*10)%30);ctx.fillStyle=`rgba(200,200,255,${0.55-i*0.12})`;ctx.beginPath();ctx.arc(18+i*12,wy,2+i*0.5,0,Math.PI*2);ctx.fill();}
      break;
    }
  }

  ctx.restore();
}


function drawLightningBolt(ctx,x1,y1,x2,y2,col,w,jag){
  const segs=8+Math.floor(jag);
  const pts=[[x1,y1]];
  for(let i=1;i<segs;i++){
    const t=i/segs;
    const mx=x1+(x2-x1)*t+(Math.random()-0.5)*jag*20;
    const my=y1+(y2-y1)*t+(Math.random()-0.5)*jag*10;
    pts.push([mx,my]);
  }
  pts.push([x2,y2]);
  ctx.save();ctx.strokeStyle=col;ctx.lineWidth=w;ctx.globalAlpha=0.9;
  ctx.shadowColor=col;ctx.shadowBlur=12;
  ctx.beginPath();pts.forEach(([px,py],i)=>{i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);});ctx.stroke();
  ctx.lineWidth=1;ctx.strokeStyle='#fff';ctx.globalAlpha=0.6;
  ctx.beginPath();pts.forEach(([px,py],i)=>{i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);});ctx.stroke();
  ctx.restore();
}

          for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,0.5)*0.55*(1+Math.sin(i*0.008)*0.6);

  const anim=()=>{
    if(dismissed)return;
    shakeX*=0.78;shakeY*=0.78;

    // Background
    const pulse=Math.sin(f*0.2)*0.12+0.88;
    const rr=Math.floor(22*pulse),gb=Math.floor(6*pulse);
    ctx.fillStyle=`rgba(${rr},${gb},${gb},${f<10?0.5:0.2})`;ctx.fillRect(0,0,W,H);

    const atmCols=['rgba(180,0,0,0.06)','rgba(60,0,100,0.08)','rgba(180,50,0,0.07)','rgba(100,80,0,0.07)','rgba(0,80,120,0.07)','rgba(80,0,100,0.09)'];

      });

      ctx.restore();
      if(f===21){tone(44,0.35,'sawtooth',0.4);tone(38,0.35,'sawtooth',0.32);}
    }

    // Warning bar
    if(f>32){
      const wa=Math.min(1,(f-32)/12);
      const wblink=Math.floor(f/7)%2===0;
      ctx.save();ctx.globalAlpha=wa;
      ctx.fillStyle=wblink?'#ff1a1a':'#700000';ctx.fillRect(0,350,W,34);
      ctx.strokeStyle='#ff3030';ctx.lineWidth=2;ctx.strokeRect(0,350,W,34);
      ctx.fillStyle='#fff';ctx.font='bold 10px monospace';ctx.textAlign='center';
      ctx.fillText('⚠  '+w.boss.sub+'  ⚠',320,372);

    }

    // Vignette

    ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

    // Continue prompt
    if(introDone){

      ctx.fillText('▶  PRESS ENTER OR CLICK TO FACE THIS FOE  ◀',W/2,462);

    }

    // SFX triggers
    if(f===8){introTheme();}

    if(f>=16&&f<45&&f%5===0){shakeX=(Math.random()-0.5)*12;shakeY=(Math.random()-0.5)*9;}

    f++;
    if(f<90)requestAnimationFrame(anim);
    else{introDone=true;requestAnimationFrame(anim);}
  };
  anim();
}

function buildBossDisplayStr(full, blanks) {
  let result = full;
  blanks.forEach(b => {
    const idx = result.indexOf(b);
    if (idx !== -1) result = result.slice(0, idx) + '___' + result.slice(idx + b.length);
  });
  return result;
}
function buildBossWordBank(blanks, idx) {
  const correct = blanks[idx];
  const pool = [correct];
  const cat = detectWordCategory(correct);
  const catPool = shuffle([...(DISTRACTOR_POOL[cat]||DISTRACTOR_POOL.nouns)]
    .filter(d=>blanks.every(b=>b.toLowerCase()!==d.toLowerCase())&&d.toLowerCase()!==correct.toLowerCase()));
  const nounPool = shuffle([...DISTRACTOR_POOL.nouns,...DISTRACTOR_POOL.nouns_concrete]
    .filter(d=>blanks.every(b=>b.toLowerCase()!==d.toLowerCase())&&d.toLowerCase()!==correct.toLowerCase()&&!catPool.includes(d)));
  let added=0;
  for(let i=0;i<catPool.length&&added<3;i++){pool.push(catPool[i]);added++;}
  for(let i=0;i<nounPool.length&&added<3;i++){pool.push(nounPool[i]);added++;}
  return shuffle(pool.slice(0,4));
}
function extractBossBlanks(full) {
  const SKIP = new Set(['a','an','the','of','to','in','is','it','by','on','as','at','or','and','but','for','with','that','this','from','into','not','no','be','my','our','us','we','him','his','her','me','do','did','he','she','they','who','how','why','can','has','have','was','were','are','had','been','its','if','so','up','out','all','both','too','very','than','their','your','will','does','just','one','nor','per','yet','any','due','via']);
  const words = full.replace(/[.,!?;:"]/g, '').split(' ');
  const blanks = [];
  words.forEach(w => {
    const lw = w.toLowerCase().trim();
    if (w.length > 1 && !SKIP.has(lw) && /[a-zA-Z]/.test(w)) blanks.push(w.trim());
  });
  return blanks;
}

function startBossBattle(){
  G.bossHP=100;
  // Grant this world's armor piece on entry (before the fight)
  if(!G.armorEarned.includes(G.wIdx))G.armorEarned.push(G.wIdx);
  // boss question = last Q in world, all content words blanked
  const bossQIdx=G.wQs[G.wQs.length-1];
  const bossQ=QS[bossQIdx];
  const bossBlanks=extractBossBlanks(bossQ.full);
  show('bossBattleScr');
  document.getElementById('bqDlg').style.display='none';
  // Play armor grant cinematic first — only set phase+bossQ AFTER it completes
  // This prevents the Enter key dismiss from instantly triggering submitBossBlank
  triggerArmorGrant(()=>{
    G.phase='boss';
    G.bossQ=bossQ;
    G.bossBlanks=bossBlanks;
    G.bossDisplayStr=buildBossDisplayStr(bossQ.full,bossBlanks);
    G.bossBlankIdx=0;G.bossFilledBlanks=[];G.bossTyped='';G.bossSel=0;
    G.bossMaxBlanks=bossBlanks.length;
    if(G.diff==='young'){G.bossWB=buildBossWordBank(bossBlanks,0);}
    document.getElementById('bqDlg').style.display='block';
    renderBQDlg();
  });
}

function triggerArmorGrant(onDone){
  const cv=document.getElementById('bbCv'),ctx=cv.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  const ap=ARMOR[G.wIdx];
  const apCol=ARMOR_BATTLE_COLS[G.wIdx];
  let f=0,animDone=false,dismissed=false;
  function dismiss(){if(dismissed)return;dismissed=true;cleanup();onDone();}
  function cleanup(){document.removeEventListener('keydown',keyH);cv.removeEventListener('click',clickH);}
  function keyH(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();if(animDone)dismiss();}}
  function clickH(){if(animDone)dismiss();}
  document.addEventListener('keydown',keyH);
  cv.addEventListener('click',clickH);
  drawBattleBg();
  function anim(){
    if(dismissed)return;
    drawBattleBg();
    const ta=Math.min(1,f/15);
    ctx.fillStyle=`rgba(0,0,20,${ta*0.85})`;ctx.fillRect(0,0,640,480);
    // Light beam
    if(f>5){
      const ba=Math.min(1,(f-5)/18);
      const gr=ctx.createLinearGradient(320,0,320,420);
      gr.addColorStop(0,`rgba(255,240,180,${ba*0.85})`);gr.addColorStop(1,'transparent');
      ctx.fillStyle=gr;ctx.fillRect(268,0,104,420);
      const gr2=ctx.createLinearGradient(320,0,320,500);
      gr2.addColorStop(0,`rgba(255,240,180,${ba*0.3})`);gr2.addColorStop(1,'transparent');
      ctx.fillStyle=gr2;ctx.beginPath();ctx.moveTo(200,0);ctx.lineTo(440,0);ctx.lineTo(390,500);ctx.lineTo(250,500);ctx.closePath();ctx.fill();
      // rotating halo
      for(let i=0;i<3;i++){const ra=f*0.05+i*Math.PI*0.66;
        ctx.strokeStyle=`rgba(255,240,180,${0.5*ba-i*0.12})`;ctx.lineWidth=2;
        ctx.beginPath();ctx.ellipse(320,220,35+i*14+Math.sin(f*0.1+i)*5,14+i*5,ra,0,Math.PI*2);ctx.stroke();}
    }
    // Item drops in
    if(f>8){
      const itemY=Math.max(190,400-Math.min(1,(f-8)/18)*210);
      const glow=Math.sin(f*0.2)*0.12+0.65;
      ctx.fillStyle=`rgba(255,220,80,${glow*0.35})`;ctx.beginPath();ctx.arc(320,itemY,38,0,Math.PI*2);ctx.fill();
      for(let i=0;i<3;i++){ctx.strokeStyle=`rgba(255,240,180,${0.45-i*0.12})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(320,itemY,28+i*13+Math.sin(f*0.14+i)*4,0,Math.PI*2);ctx.stroke();}
      ctx.font='52px serif';ctx.textAlign='center';ctx.fillText(ap.p,320,itemY+18);
    }
    // Text panel
    if(f>22){
      const ta2=Math.min(1,(f-22)/10);
      ctx.fillStyle=`rgba(0,0,20,${ta2*0.92})`;ctx.fillRect(80,308,480,120);
      ctx.strokeStyle=apCol;ctx.lineWidth=3;ctx.strokeRect(80,308,480,120);
      ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=1;ctx.strokeRect(87,315,466,106);
      ctx.globalAlpha=ta2;
      ctx.fillStyle=apCol;ctx.font='bold 15px Courier New';ctx.textAlign='center';
      ctx.fillText(ap.p+'  '+ap.n.toUpperCase()+'  '+ap.p,320,345);
      ctx.fillStyle='#c0e8ff';ctx.font='9px monospace';ctx.fillText('EQUIPPED FOR BATTLE!',320,365);
      ctx.fillStyle='rgba(255,255,200,0.85)';ctx.font='8px monospace';
      ctx.fillText(ARMOR_BATTLE_DESC[G.wIdx],320,385);
      ctx.globalAlpha=1;
    }
    // "Press Enter" prompt — shown after anim completes
    if(animDone){
      const blink=Math.floor(f/22)%2===0;
      ctx.globalAlpha=blink?1:0.45;
      ctx.fillStyle='#f8c840';ctx.font='bold 10px monospace';ctx.textAlign='center';
      ctx.fillText('▶  PRESS ENTER OR CLICK TO CONTINUE  ◀',320,462);
      ctx.globalAlpha=1;
    }
    f++;
    if(f<90){requestAnimationFrame(anim);}
    else{animDone=true;requestAnimationFrame(anim);}// keep animating for blink effect
  }
  anim();
}

function triggerBossAttackAnim(onDone){
  const cv=document.getElementById('bbCv'),ctx=cv.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  const apCol=ARMOR_BATTLE_COLS[G.wIdx],armorIdx=G.wIdx;

  tone(420,0.03,'square',0.13);setTimeout(()=>tone(560,0.03,'square',0.15),90);setTimeout(()=>tone(740,0.04,'square',0.18),170);
  function step(){
    f++;
    renderBossScene();
    if(f<=10){
      // Windup: pilgrim crouches/raises weapon, golden charge ring pulses
      const a=f/10;
      const gr=ctx.createRadialGradient(pX+24,pY+24,0,pX+24,pY+24,46);
      gr.addColorStop(0,`rgba(255,255,180,${a*0.75})`);gr.addColorStop(0.55,`rgba(255,210,60,${a*0.3})`);gr.addColorStop(1,'transparent');
      ctx.fillStyle=gr;ctx.beginPath();ctx.arc(pX+24,pY+24,46,0,Math.PI*2);ctx.fill();
      ctx.save();ctx.globalAlpha=a*0.7;ctx.strokeStyle=apCol;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(pX+24,pY+24,28+f*1.8,0,Math.PI*2);ctx.stroke();ctx.restore();
      drawArmorWeaponBattle(ctx,pX+56,pY-22,armorIdx,-Math.PI*0.62,3.1);
    } else if(f<=26){
      // Projectile bolt arcs from pilgrim to boss
      const t=(f-10)/16;
      const px=pX+28+(bX-pX-28)*t;
      const py=pY+18+(bY-pY-18)*t-Math.sin(t*Math.PI)*26;
      // Trail ghost copies fading behind
      for(let i=4;i>=1;i--){
        const bt=Math.max(0,t-i*0.065);
        const bpx=pX+28+(bX-pX-28)*bt,bpy=pY+18+(bY-pY-18)*bt-Math.sin(bt*Math.PI)*26;
        ctx.save();ctx.globalAlpha=0.20-i*0.038;ctx.fillStyle=apCol;
        ctx.beginPath();ctx.arc(bpx,bpy,Math.max(1,(5-i)*3.2),0,Math.PI*2);ctx.fill();ctx.restore();
      }
      // Core orb: white center → armor color rim
      const gr=ctx.createRadialGradient(px,py,0,px,py,13);
      gr.addColorStop(0,'#ffffff');gr.addColorStop(0.3,'rgba(255,255,200,0.9)');gr.addColorStop(0.65,apCol);gr.addColorStop(1,'transparent');
      ctx.fillStyle=gr;ctx.beginPath();ctx.arc(px,py,13,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(px-1,py-1,3.5,0,Math.PI*2);ctx.fill();
      // Sparks along trail
      ctx.save();ctx.globalAlpha=0.6;ctx.fillStyle='#ffe080';
      ctx.fillRect(px-1,py-3,2,6);ctx.fillRect(px-3,py-1,6,2);ctx.restore();
      drawArmorWeaponBattle(ctx,pX+56,pY-8,armorIdx,-Math.PI*0.28,2.5);
    } else if(f<=38){
      // Impact: burst ring + flash at boss position
      const p=(f-26)/12,flashA=Math.max(0,1-p)*0.85;
      const rr=(f-26)*9;
      // Radial burst
      const gr2=ctx.createRadialGradient(bX,bY,0,bX,bY,rr);
      gr2.addColorStop(0,`rgba(255,255,200,${flashA*0.9})`);gr2.addColorStop(0.4,`rgba(255,210,80,${flashA*0.55})`);gr2.addColorStop(1,'transparent');
      ctx.fillStyle=gr2;ctx.beginPath();ctx.arc(bX,bY,rr+4,0,Math.PI*2);ctx.fill();
      // Expanding ring
      ctx.save();ctx.globalAlpha=flashA*0.95;ctx.strokeStyle=apCol;ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(bX,bY,rr,0,Math.PI*2);ctx.stroke();
      ctx.strokeStyle='#ffffff';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(bX,bY,rr*0.6,0,Math.PI*2);ctx.stroke();ctx.restore();
      // Spiky cross flash
      ctx.save();ctx.globalAlpha=flashA*0.7;ctx.fillStyle='#fff8c0';
      ctx.fillRect(bX-2,bY-22,4,44);ctx.fillRect(bX-22,bY-2,44,4);ctx.restore();
      drawArmorWeaponBattle(ctx,pX+56,pY-2,armorIdx,-Math.PI*0.12,2.4);
    } else {
      bqDlg.style.display='block';
      triggerBossShudder();
      onDone();
      return;
    }
    requestAnimationFrame(step);
  }
  step();
}

function submitBossBlank(answer){
  const correct=(G.bossBlanks||G.bossQ.blanks)[G.bossBlankIdx];
  const ok=answer.toLowerCase().trim()===correct.toLowerCase().trim();
  if(ok){
    sfxBossHit();flash('#f8c840',0.22);G.bossFilledBlanks.push(answer);G.bossBlankIdx++;
    const dmgPer=Math.floor(100/G.bossMaxBlanks);G.bossHP=Math.max(0,G.bossHP-dmgPer);showBossDamageNumber(dmgPer);
    if(G.bossBlankIdx>=G.bossMaxBlanks){G.bossHP=0;G.score+=200;G.correct++;G.totalAnswered++;bossDefeatAnimation();}
    else{G.bossTyped='';G.bossSel=0;if(G.diff==='young')G.bossWB=buildBossWordBank(G.bossBlanks||G.bossQ.blanks,G.bossBlankIdx);triggerBossAttackAnim(()=>{renderBQDlg();});}
  }else{sfxLose();flash('#ff0000',0.4);G.lives=Math.max(0,G.lives-1);G.wrong++;G.totalAnswered++;bossWinsAnimation();}
}

  let particles=[],shockRings=[],embers=[];

  function sfxCharge(){[330,370,420,480,560,660].forEach((n,i)=>setTimeout(()=>tone(n,0.04,'square',0.14),i*45));}
  function sfxImpact(){tone(80,0.05,'sawtooth',0.4);setTimeout(()=>tone(55,0.1,'sawtooth',0.28),45);}
  function drawHUD(){ctx.fillStyle='rgba(0,0,10,0.93)';ctx.fillRect(0,0,640,22);ctx.fillStyle='#200020';ctx.fillRect(0,20,640,2);ctx.fillStyle='#ff4040';ctx.fillRect(0,21,640,1);ctx.fillStyle='#f8c840';ctx.font='bold 9px monospace';ctx.textAlign='left';ctx.fillText('⭐'+G.score,8,15);ctx.fillStyle='#ff6060';ctx.textAlign='center';ctx.font='bold 9px monospace';ctx.fillText('⚔  BOSS BATTLE  ⚔',320,15);}

function endWorld(won){
  stopLoop();G.win=won;
  const w=WORLDS[G.wIdx];
  if(won){
    if(!G.worldsDone.includes(G.wIdx)){G.worldsDone.push(G.wIdx);G.score+=300;}
    if(!G.armorEarned.includes(G.wIdx))G.armorEarned.push(G.wIdx);
  }
  save();
  if(!won&&G.lives<=0){showGameOver();return;}
  const acc=G.correct+G.wrong>0?Math.round(G.correct/(G.correct+G.wrong)*100):100;
  document.getElementById('resIcon').textContent=won?(acc===100?'🏆':acc>=80?'🎉':'😊'):'💀';
  document.getElementById('resTitle').textContent=won?'WORLD COMPLETE!':'DEFEATED...';
  document.getElementById('resSub').textContent=won?w.boss.name+' has been vanquished! +300 bonus points!':'The enemy was too strong this time. Keep learning!';
  document.getElementById('rRight').textContent=G.correct;
  document.getElementById('rWrong').textContent=G.wrong;
  document.getElementById('rScore').textContent=G.score;
  const am=document.getElementById('armorMsg');
  if(won&&G.armorEarned.includes(G.wIdx)){am.style.display='block';am.textContent=ARMOR[G.wIdx].p+' '+ARMOR[G.wIdx].n+' EARNED!';}
  else am.style.display='none';
  const nw=WORLDS[G.wIdx+1];
  document.getElementById('nextWBtn').style.display=won&&nw?'block':'none';
  document.getElementById('retryBtn').style.display=won?'none':'block';
  const cv=document.getElementById('resCv'),ctx=cv.getContext('2d');
  const gr=ctx.createLinearGradient(0,0,0,480);
  gr.addColorStop(0,won?'#001800':'#180000');gr.addColorStop(1,'#000');
  ctx.fillStyle=gr;ctx.fillRect(0,0,640,480);
  if(won){for(let i=0;i<25;i++){ctx.fillStyle=`rgba(248,200,64,${Math.random()*0.25})`;ctx.beginPath();ctx.arc(Math.random()*640,Math.random()*480,Math.random()*4+1,0,Math.PI*2);ctx.fill();}}
  show('resultScr');
}

function goNextWorld(){if(G.wIdx<5)beginWorld(G.wIdx+1);else goWM();}
function retryWorld(){beginWorld(G.wIdx);}

  ctx.fillText('Loading leaderboard...',320,400);

let _lbTimer=null;
function lbBack(){
  if(_lbTimer){clearInterval(_lbTimer);_lbTimer=null;}
  goTitle();
}
function goLeaderboard(fromGameOver){
  if(_lbTimer){clearInterval(_lbTimer);_lbTimer=null;}
  const rankEl=document.getElementById('lbScrRank');
  const cdEl=document.getElementById('lbScrCountdown');
  const rowsEl=document.getElementById('lbScrRows');
  rankEl.style.display='none';
  cdEl.style.display='none';
  rowsEl.innerHTML='<div style="font-size:7px;color:#6060a0;padding:12px;text-align:center;">Loading...</div>';
  show('lbScr');

  function renderLbScr(entries){
    rowsEl.innerHTML='';
    if(!entries.length){rowsEl.innerHTML='<div style="font-size:7px;color:#6060a0;padding:12px;text-align:center;">No scores yet — be the first!</div>';return;}
    let playerRank=-1;
    if(fromGameOver){
      // Find best matching entry for current player
      playerRank=entries.findIndex(e=>e.name===G.name);
    }
    if(playerRank>=0){
      const rankNum=playerRank+1;
      const medal=rankNum===1?'🥇 ':rankNum===2?'🥈 ':rankNum===3?'🥉 ':'🎖 ';
      rankEl.textContent=medal+G.name.toUpperCase()+' — YOU RANKED #'+rankNum+'!  '+medal;
      rankEl.style.display='block';
      sfxWin();
    } else if(fromGameOver){
      rankEl.textContent='Keep going — hit the leaderboard next time!';
      rankEl.style.display='block';
      rankEl.style.color='#8080c0';
      rankEl.style.borderColor='#404060';
      rankEl.style.background='rgba(0,0,20,0.88)';
    }
    const medals=['🥇','🥈','🥉'];
    entries.forEach((e,i)=>{
      const isPlayer=fromGameOver&&i===playerRank;
      rowsEl.innerHTML+=`<div class="${isPlayer?'lb-player':''}" style="display:grid;grid-template-columns:28px 1fr 58px 1fr;font-size:7px;padding:5px 4px;border-bottom:1px solid #1a1a30;gap:4px;background:${isPlayer?'rgba(248,200,64,0.12)':'transparent'};color:${isPlayer?'#f8c840':'#c0c0ff'};">
        <span style="color:${isPlayer?'#f8c840':'#505080'}">${medals[i]||(i+1)}</span>
        <span style="${isPlayer?'font-weight:bold;':''}">${e.name}</span>
        <span style="color:${isPlayer?'#ffe060':'#f0d060'}">${e.score}</span>
        <span style="color:#505080">${e.date||''}</span>
      </div>`;
    });
    if(playerRank>4){
      setTimeout(()=>{
        const rows=rowsEl.querySelectorAll('div');
        if(rows[playerRank])rows[playerRank].scrollIntoView({behavior:'smooth',block:'center'});
      },400);
    }
  }

  const doFetch=()=>{
    if(_fbDb){
      _fbDb.ref('cq3lb').orderByChild('score').limitToLast(25).once('value',snap=>{
        const entries=[];snap.forEach(c=>entries.push(c.val()));
        entries.sort((a,b)=>b.score-a.score);
        renderLbScr(entries);
      });
    } else {
      renderLbScr(JSON.parse(localStorage.getItem('cq3lb')||'[]'));
    }
  };
  // Small delay when coming from game over to let Firebase write settle
  fromGameOver ? setTimeout(doFetch,600) : doFetch();

  if(fromGameOver){
    let count=18;
    cdEl.style.display='block';
    cdEl.textContent='Returning to title in '+count+'...';
    _lbTimer=setInterval(()=>{
      count--;
      cdEl.textContent='Returning to title in '+count+'...';
      if(count<=0){clearInterval(_lbTimer);_lbTimer=null;goTitle();}
    },1000);
  }
}

function _updateSoundBtn(){

function pauseGame(){
  if(G.phase==='bossIntro')return;
  G.paused=true;
  _updateSoundBtn();
  const po=document.getElementById('pauseOverlay');
  po.style.display='flex';
}
function resumeGame(){
  G.paused=false;
  document.getElementById('pauseOverlay').style.display='none';
}

  const saveBtn=Array.from(document.querySelectorAll('#pauseOverlay .pbtn')).find(b=>b.textContent.includes('SAVE'));
  if(saveBtn){const orig=saveBtn.textContent;saveBtn.textContent='✓ SAVED!';saveBtn.style.color='#60ff60';setTimeout(()=>{saveBtn.textContent=orig;saveBtn.style.color='';},1200);}
}
function pauseQuitWM(){

  goWM();
}
function pauseQuitTitle(){
  G.paused=false;
  document.getElementById('pauseOverlay').style.display='none';

}

  localStorage.setItem('cqSound',soundOn?'on':'off');

}

function startJourney(){
  const n=document.getElementById('nameInp').value.trim();
  if(!n){document.getElementById('nameInp').focus();return;}
  G.name=n;G.gender=sel.g;G.diff=sel.d;
  G.score=0;G.lives=3;G.worldsDone=[];G.armorEarned=[];G.totalAnswered=0;G.qIdx=0;G.correct=0;G.wrong=0;
  sfxMenu();save();goWM();
}

function doLoad(){
  const saves=JSON.parse(localStorage.getItem('cq3s')||'{}');
  const names=Object.keys(saves);
  if(!names.length){alert('No saved games found!');return;}
  const nm=names[names.length-1],s=saves[nm];
  G.name=nm;G.gender=s.gender||'boy';G.diff=s.diff||'young';
  G.score=s.score||0;G.lives=s.lives||3;
  G.worldsDone=s.worldsDone||[];G.armorEarned=s.armorEarned||[];G.totalAnswered=s.totalAnswered||0;
  sfxMenu();goWM();
}

// ===============================
// PARENT MODE
// ===============================
function buildParent(){
  const saves=JSON.parse(localStorage.getItem('cq3s')||'{}');
  const lbEl=document.getElementById('lbRows');
  lbEl.innerHTML='<div style="font-size:7px;color:#6060a0;padding:8px">Loading scores...</div>';
  function renderLb(entries){
    lbEl.innerHTML='';
    if(!entries.length){lbEl.innerHTML='<div style="font-size:7px;color:#6060a0;padding:8px">No scores yet!</div>';return;}
    entries.forEach((e,i)=>{
      const m=['🥇','🥈','🥉'];
      lbEl.innerHTML+=`<div style="display:grid;grid-template-columns:28px 1fr 55px 1fr;font-size:7px;color:#c0c0ff;padding:4px 0;border-bottom:1px solid #202040;gap:4px;"><span style="color:#f8c840">${m[i]||(i+1)}</span><span>${e.name}</span><span style="color:#f8c840">${e.score}</span><span style="color:#8080a0">${e.date||''}</span></div>`;
    });
  }
  if(_fbDb){
    _fbDb.ref('cq3lb').orderByChild('score').limitToLast(25).once('value',snap=>{
      const entries=[];snap.forEach(c=>entries.push(c.val()));
      entries.sort((a,b)=>b.score-a.score);renderLb(entries);
    });
  } else {
    const lb=JSON.parse(localStorage.getItem('cq3lb')||'[]');renderLb(lb);
  }
  const si=document.getElementById('savesInfo');si.innerHTML='';
  Object.entries(saves).forEach(([n,s])=>{
    const d=new Date(s.ts).toLocaleDateString();
    si.innerHTML+=`📂 ${n} — Score: ${s.score} | Worlds: ${(s.worldsDone||[]).length}/6 | Mode: ${s.diff||'young'} | ${d}<br>`;
  });
  if(!Object.keys(saves).length)si.innerHTML='No saved games.';
}
function clearAll(){if(confirm('Clear ALL data?')){localStorage.removeItem('cq3s');localStorage.removeItem('cq3lb');buildParent();}}

// ===============================
// INIT
// ===============================
drawTitle();
// Start title music on first click (audio context needs user gesture)
document.getElementById('titleScr').addEventListener('click',()=>playTitleMusic(),{once:false});
setInterval(()=>{if(document.getElementById('titleScr').classList.contains('on'))drawTitle();},4000);

// ── AUTO-SCALE: fit 640×480 game to any screen size ──────────
(function scaleGame(){
  const gc=document.getElementById('gc');
  function resize(){
    const scaleX=window.innerWidth/648;// 640 + 8px border
    const scaleY=window.innerHeight/488;
    const scale=Math.min(scaleX,scaleY);
    gc.style.transform=`scale(${scale})`;
  }
  resize();
  window.addEventListener('resize',resize);
})();
</script>
